version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: facial-backend
    ports:
      - "8090:8000"
    volumes:
      - ./backend/recognition.db:/app/recognition.db
    restart: always
    env_file:
      - ./backend/.env
    networks:  # ✅ FALTA: backend también debe estar en la red
      - app-network

  frontend:
    build: 
      context: ./frontend/face-recognition-app
    container_name: facial-frontend
    ports: 
      - "8083:8083"   # Metro bundler
      - "19000:19000" # ✅ CAMBIAR: Expo DevTools (no 8083)
      - "19001:19001" # ✅ AGREGAR: Expo DevTools
      - "19002:19002" # ✅ AGREGAR: Expo DevTools
    volumes:  # ✅ AGREGAR: Para hot reload
      - ./frontend/face-recognition-app:/app
      - /app/node_modules  # Evita sobrescribir node_modules del contenedor
    depends_on:
      - backend
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.40.5
      - URL=http://192.168.40.5:8090  # ✅ CAMBIAR: Usar puerto expuesto 8080, no 8000
    stdin_open: true
    tty: true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge